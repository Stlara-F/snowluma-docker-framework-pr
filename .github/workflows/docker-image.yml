name: docker-publish

on:
  workflow_dispatch:
    inputs:
      image:
        description: Docker image name, for example docker.io/example/snowluma
        required: true
        default: ""
      tag:
        description: Docker image tag
        required: true
        default: ""
      push:
        description: Push image after build
        required: true
        type: boolean
        default: false

jobs:
  build-amd64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Docker framework
        uses: actions/checkout@v4

      - name: Verify prebuilt SnowLuma artifact
        run: ./scripts/prepare-artifact.sh

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
          PUSH: ${{ inputs.push }}
        run: |
          set -eu
          if [ -z "${IMAGE}" ]; then
            echo "workflow input image is required"
            exit 1
          fi
          if [ -z "${TAG}" ]; then
            echo "workflow input tag is required"
            exit 1
          fi
          OUTPUT="--load"
          if [ "${PUSH}" = "true" ]; then
            OUTPUT="--push"
          fi
          docker buildx build \
            --platform linux/amd64 \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            --file ./Dockerfile \
            ${OUTPUT} \
            .

      - name: Docker logout
        if: always()
        run: docker logout || true
