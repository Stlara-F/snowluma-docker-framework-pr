name: sync-dev-build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLATFORMS: linux-x64,linux-arm64
  PLATFORM_MAP: '{"linux-x64":"linux/amd64","linux-arm64":"linux/arm64"}'

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Source repository (owner/repo)'
        required: false
        default: 'SnowLuma/SnowLuma'
      branch:
        description: 'Source branch'
        required: false
        default: 'dev'
      workflow_name:
        description: 'Source workflow name'
        required: false
        default: 'Dev Build'
      artifact_name_template:
        description: >
          Artifact name template (default: SnowLuma-dev-{sha}-{platform}).
          Placeholders: {sha}, {sha_short}, {branch}, {platform},
          {workflow}, {repo_owner}, {repo_name}, {repo}
        required: false
        default: ''
      docker_image:
        description: 'Docker image name (empty = vars.DOCKER_IMAGE)'
        required: false
        default: ''
      docker_image_tag:
        description: 'Docker image tag'
        required: false
        default: 'dev'
      force:
        description: 'Sync even if lock file SHA matches'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Check only; skip download and build'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    outputs:
      repo_owner: ${{ steps.validate.outputs.repo_owner }}
      repo_name: ${{ steps.validate.outputs.repo_name }}
    steps:
      - id: validate
        env:
          REPO: ${{ inputs.repository }}
          TAG: ${{ inputs.docker_image_tag }}
        run: |
          set -euo pipefail
          if ! [[ "$REPO" =~ ^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
            echo "Invalid repository: $REPO (expected owner/repo)" >&2; exit 1
          fi
          echo "repo_owner=${REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "repo_name=${REPO#*/}" >> "$GITHUB_OUTPUT"
          if ! [[ "$TAG" =~ ^[a-z0-9._-]+$ ]]; then
            echo "Invalid Docker tag: $TAG (must match [a-z0-9._-]+)" >&2; exit 1
          fi

  check:
    needs: validate
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    outputs:
      has_update: ${{ steps.check.outputs.has_update }}
      head_sha: ${{ steps.check.outputs.head_sha }}
      run_id: ${{ steps.check.outputs.run_id }}
      is_dry_run: ${{ steps.check.outputs.is_dry_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.UPSTREAM_PAT || secrets.SNOWLUMA_GH_TOKEN || github.token }}

      - id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.UPSTREAM_PAT || secrets.SNOWLUMA_GH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          is_dry_run="${{ inputs.dry_run == true && 'true' || 'false' }}"
          echo "is_dry_run=${is_dry_run}" >> "$GITHUB_OUTPUT"

          repo="${{ inputs.repository }}"
          branch="${{ inputs.branch }}"
          workflow="${{ inputs.workflow_name }}"

          branch_tip="$(gh api "repos/${repo}/commits/${branch}" --jq .sha)"
          echo "head_sha=${branch_tip}" >> "$GITHUB_OUTPUT"
          echo "Upstream ${repo}@${branch} HEAD: ${branch_tip}"

          force="${{ inputs.force == true && '1' || '0' }}"
          if [ "${force}" = "1" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Lock file — skip if same SHA
          last_sha=""
          if [ -f .github/snowluma-dev-lock.json ]; then
            last_sha="$(jq -r '.sha // empty' .github/snowluma-dev-lock.json)"
          fi
          if [ "${last_sha}" = "${branch_tip}" ]; then
            echo "Already synced at ${branch_tip}; no update needed."
            echo "has_update=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          run_json="$(gh run list \
            --repo "${repo}" \
            --workflow "${workflow}" \
            --branch "${branch}" \
            --commit "${branch_tip}" \
            --status success \
            --limit 1 \
            --json databaseId,headSha 2>/dev/null || true)"

          if [ -z "${run_json}" ] || [ "${run_json}" = "[]" ]; then
            echo "No successful ${workflow} run found for ${branch_tip}."
            echo "has_update=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          run_id="$(echo "${run_json}" | jq -r '.[0].databaseId')"
          echo "has_update=true" >> "$GITHUB_OUTPUT"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "Found run #${run_id} for ${branch_tip:0:12}"

      - name: Dry run report
        if: ${{ inputs.dry_run && steps.check.outputs.has_update == 'true' }}
        run: |
          echo "=== DRY RUN ==="
          echo "Repository: ${{ inputs.repository }}"
          echo "Branch:     ${{ inputs.branch }}"
          echo "Workflow:   ${{ inputs.workflow_name }}"
          echo "SHA:        ${{ steps.check.outputs.head_sha }}"
          echo "Run ID:     ${{ steps.check.outputs.run_id }}"
          echo "Tag:        ${{ inputs.docker_image_tag }}"
          echo "Would download artifacts and build Docker image."

  download:
    needs: check
    if: ${{ needs.check.outputs.has_update == 'true' && needs.check.outputs.is_dry_run != 'true' }}
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    outputs:
      platforms: ${{ steps.check_platforms.outputs.platforms }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.UPSTREAM_PAT || secrets.SNOWLUMA_GH_TOKEN || github.token }}

      - name: Download artifacts from upstream
        id: download
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.UPSTREAM_PAT || secrets.SNOWLUMA_GH_TOKEN || github.token }}
          SNOWLUMA_REPO: ${{ inputs.repository }}
          HEAD_SHA: ${{ needs.check.outputs.head_sha }}
          RUN_ID: ${{ needs.check.outputs.run_id }}
          SOURCE_BRANCH: ${{ inputs.branch }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          ARTIFACT_NAME_TEMPLATE: ${{ inputs.artifact_name_template }}
        run: |
          chmod +x ./scripts/sync-dev-framework.sh
          ./scripts/sync-dev-framework.sh

      - name: List downloaded platforms
        id: check_platforms
        run: |
          platforms=""
          IFS=',' read -ra list <<< "${{ env.PLATFORMS }}"
          for p in "${list[@]}"; do
            p="$(echo "$p" | xargs)"; [ -z "$p" ] && continue
            [ -f "SnowLuma.Framework.${p}.tar.gz" ] && platforms="${platforms}${platforms:+,}${p}"
          done
          echo "platforms=$platforms" >> "$GITHUB_OUTPUT"
          echo "Downloaded: $platforms"

      - name: Upload framework tarballs
        uses: actions/upload-artifact@v7
        with:
          name: framework-tarballs
          path: SnowLuma.Framework*.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Commit framework tarballs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/snowluma-dev-lock.json
          shopt -s nullglob
          for file in SnowLuma.Framework*.tar.gz; do
            git add "${file}"
          done
          if git diff --staged --quiet; then
            echo "Framework tarballs unchanged; skip commit."
            exit 0
          fi
          sha="${{ needs.check.outputs.head_sha }}"
          git commit -m "chore: update dev framework @ ${sha:0:12}"
          git push

  resolve:
    needs: download
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - id: resolve
        env:
          DOWNLOADED_PLATFORMS: ${{ needs.download.outputs.platforms }}
        run: |
          set -euo pipefail
          PLATFORM_MAP='${{ env.PLATFORM_MAP }}'
          matrix='{"include":['
          separator=''
          IFS=',' read -ra platforms <<< "$DOWNLOADED_PLATFORMS"
          for platform in "${platforms[@]}"; do
            [ -z "$platform" ] && continue
            docker_platform=$(echo "$PLATFORM_MAP" | jq -r --arg p "$platform" '.[$p]')
            [ "$docker_platform" = "null" ] && continue
            case "$docker_platform" in
              linux/amd64) os="ubuntu-22.04" ;;
              linux/arm64) os="ubuntu-22.04-arm" ;;
              *) echo "Warning: no runner for $docker_platform; skip" >&2; continue ;;
            esac
            matrix="${matrix}${separator}{\"tarball_platform\":\"${platform}\",\"docker_platform\":\"${docker_platform}\",\"os\":\"${os}\"}"
            separator=','
          done
          matrix="${matrix}]}"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    if: needs.resolve.outputs.matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Download framework tarballs
        uses: actions/download-artifact@v7
        with:
          name: framework-tarballs
          path: .

      - name: Resolve framework tarball
        env:
          PLATFORM: ${{ matrix.docker_platform }}
        run: |
          chmod +x ./scripts/resolve-framework-tarball.sh
          ./scripts/resolve-framework-tarball.sh
          ls -lh SnowLuma.Framework.tar.gz

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: build
        env:
          IMAGE: ${{ inputs.docker_image || vars.DOCKER_IMAGE }}
          TAG: ${{ inputs.docker_image_tag }}
          PLATFORM: ${{ matrix.docker_platform }}
        run: |
          set -eu
          if [ -z "${IMAGE}" ]; then
            echo "docker_image input is required (set vars.DOCKER_IMAGE or provide input)" >&2
            exit 1
          fi
          docker buildx build \
            --platform "${PLATFORM}" \
            --tag "${IMAGE}" \
            --file ./Dockerfile \
            --output "type=image,push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file metadata.json \
            .
          digest="$(jq -r '."containerimage.digest"' metadata.json)"
          if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
            echo "Unable to resolve pushed image digest" >&2
            cat metadata.json >&2; exit 1
          fi
          mkdir -p digests
          touch "digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.tarball_platform }}
          path: digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: always()
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download image digests
        uses: actions/download-artifact@v7
        with:
          pattern: docker-digest-*
          path: digests
          merge-multiple: true

      - name: Create and push multi-arch manifest
        env:
          IMAGE: ${{ inputs.docker_image || vars.DOCKER_IMAGE }}
          TAG: ${{ inputs.docker_image_tag }}
        run: |
          set -euo pipefail
          cd digests
          shopt -s nullglob
          digest_files=(*)
          if [ "${#digest_files[@]}" -eq 0 ]; then
            echo "No digests found; all builds may have failed" >&2
            exit 1
          fi
          refs=()
          for digest in "${digest_files[@]}"; do
            refs+=("${IMAGE}@sha256:${digest}")
          done
          tags=(--tag "${IMAGE}:${TAG}")
          if [ "${TAG}" != "latest" ]; then
            tags+=(--tag "${IMAGE}:latest")
          fi
          docker buildx imagetools create "${tags[@]}" "${refs[@]}"
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
