name: sync-snowluma-dev

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force re-sync even if same commit
        required: false
        type: boolean
        default: false
      platforms:
        description: Platforms to sync (comma-separated)
        required: false
        default: "linux-x64,linux-arm64"
      source_repo:
        description: Source repository (owner/repo)
        required: false
        default: "Stlara-F/SnowLuma"
      source_branch:
        description: Source branch
        required: false
        default: "dev"
      target_tag:
        description: Tag used in artifact names (defaults to source_branch)
        required: false
        default: ""
  repository_dispatch:
    types: [snowluma-dev-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.SNOWLUMA_GH_TOKEN || secrets.SNOWLUMA_GITHUB_TOKEN }}

      - name: Resolve configuration
        id: config
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REPO="${{ inputs.source_repo }}"
            BRANCH="${{ inputs.source_branch }}"
            TAG="${{ inputs.target_tag }}"
          elif [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            REPO="${{ github.event.client_payload.source_repo }}"
            BRANCH="${{ github.event.client_payload.source_branch }}"
            TAG="${{ github.event.client_payload.target_tag }}"
          else
            echo "Unsupported event" >&2
            exit 1
          fi
          REPO="${REPO:-Stlara-F/SnowLuma}"
          BRANCH="${BRANCH:-dev}"
          TAG="${TAG:-$BRANCH}"
          echo "source_repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "source_branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "target_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check for new commit and get Dev Build run ID
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.SNOWLUMA_GH_TOKEN || secrets.SNOWLUMA_GITHUB_TOKEN }}
          SOURCE_REPO: ${{ steps.config.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.config.outputs.source_branch }}
        run: |
          set -euo pipefail
          LOCK_SUFFIX="$(echo "${SOURCE_REPO}_${SOURCE_BRANCH}" | sha256sum | head -c 8)"
          LOCK_FILE=".github/snowluma-sync-${LOCK_SUFFIX}.json"
          branch_tip="$(gh api repos/${SOURCE_REPO}/commits/${SOURCE_BRANCH} --jq .sha)"
          echo "Upstream HEAD: ${branch_tip}"
          force="${{ github.event_name == 'workflow_dispatch' && inputs.force == true && '1' || '0' }}"
          last_sha=""
          if [ -f "${LOCK_FILE}" ]; then
            last_sha="$(jq -r '.sha // empty' "${LOCK_FILE}")"
          fi
          if [ "${force}" != "1" ] && [ "${last_sha}" = "${branch_tip}" ]; then
            echo "No new commits, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          run_json="$(gh run list \
            --repo "${SOURCE_REPO}" \
            --branch "${SOURCE_BRANCH}" \
            --commit "${branch_tip}" \
            --workflow "Dev Build" \
            --status success \
            --limit 1 \
            --json databaseId 2>/dev/null || true)"
          if [ -z "${run_json}" ] || [ "${run_json}" = "[]" ]; then
            echo "No successful Dev Build found for ${branch_tip}, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          run_id="$(echo "${run_json}" | jq -r '.[0].databaseId')"
          echo "Found Dev Build run: ${run_id}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "head_sha=${branch_tip}" >> "$GITHUB_OUTPUT"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "lock_file=${LOCK_FILE}" >> "$GITHUB_OUTPUT"

      - name: Download and package framework tarballs
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.SNOWLUMA_GH_TOKEN || secrets.SNOWLUMA_GITHUB_TOKEN }}
          SOURCE_REPO: ${{ steps.config.outputs.source_repo }}
          TARGET_TAG: ${{ steps.config.outputs.target_tag }}
          RUN_ID: ${{ steps.check.outputs.run_id }}
          PLATFORMS: ${{ inputs.platforms || 'linux-x64,linux-arm64' }}
        run: |
          set -euo pipefail
          IFS=',' read -r -a platform_list <<< "${PLATFORMS}"
          for platform in "${platform_list[@]}"; do
            platform="$(echo "${platform}" | xargs)"
            [ -n "${platform}" ] || continue
            case "${platform}" in
              linux-x64)  asset_arch="linux-x64" ;;
              linux-arm64) asset_arch="linux-arm64" ;;
              *) echo "Unsupported platform: ${platform}" >&2; exit 1 ;;
            esac
            pattern="SnowLuma-${TARGET_TAG}-*-${asset_arch}"
            echo "Downloading ${pattern}"
            tmp="$(mktemp -d)"
            cd "${tmp}"
            gh run download "${RUN_ID}" \
              --repo "${SOURCE_REPO}" \
              --pattern "${pattern}" \
              --dir .
            artifact_dir="$(find . -maxdepth 1 -type d -name "SnowLuma-${TARGET_TAG}-*-${asset_arch}" | head -n1)"
            if [ -z "${artifact_dir}" ]; then
              echo "Artifact not found for pattern ${pattern}" >&2
              exit 1
            fi
            echo "Artifact directory: ${artifact_dir}"
            cd "${artifact_dir}"

            # 查找 index.mjs 的位置（如果不在根目录，则进入子目录）
            if [ -f "index.mjs" ]; then
              pack_dir="."
            else
              subdir="$(find . -maxdepth 2 -name "index.mjs" -printf "%h\n" | head -n1)"
              if [ -n "${subdir}" ]; then
                pack_dir="${subdir#./}"
                echo "Found index.mjs in subdirectory: ${pack_dir}"
              else
                echo "ERROR: index.mjs not found in artifact" >&2
                echo "Contents of artifact:"
                ls -laR .
                exit 1
              fi
            fi
            # 打包该目录内容
            tar -czf "${OLDPWD}/SnowLuma.Framework.${platform}.tar.gz" -C "${pack_dir}" .
            cd "${OLDPWD}"
            rm -rf "${tmp}"
            if [ "${platform}" = "linux-x64" ]; then
              cp "SnowLuma.Framework.${platform}.tar.gz" SnowLuma.Framework.tar.gz
            fi
          done
          if [ ! -f SnowLuma.Framework.tar.gz ] && [ "${#platform_list[@]}" -gt 0 ]; then
            cp "SnowLuma.Framework.${platform_list[0]}.tar.gz" SnowLuma.Framework.tar.gz
          fi
          ls -lh SnowLuma.Framework*.tar.gz

      - name: Verify framework tarballs
        if: steps.check.outputs.skip == 'false'
        env:
          PLATFORMS: ${{ inputs.platforms || 'linux-x64,linux-arm64' }}
        run: |
          set -euo pipefail
          verify_platform() {
            local platform="$1"
            local native_arch
            case "${platform}" in
              linux-x64) native_arch="x64" ;;
              linux-arm64) native_arch="arm64" ;;
              *) return 1 ;;
            esac
            local file="SnowLuma.Framework.${platform}.tar.gz"
            test -f "${file}" || { echo "Missing ${file}"; exit 1; }
            tmp="$(mktemp -d)"
            echo "Extracting ${file} to ${tmp} for verification"
            tar -xzf "${file}" -C "${tmp}"
            echo "Contents of ${tmp}:"
            ls -laR "${tmp}" || true
            if [ ! -f "${tmp}/index.mjs" ]; then
              echo "ERROR: index.mjs not found in root" >&2
              echo "Searching for index.mjs:"
              find "${tmp}" -name "index.mjs"
              exit 1
            fi
            if [ ! -f "${tmp}/native/snowluma-linux-${native_arch}.node" ]; then
              echo "ERROR: native/snowluma-linux-${native_arch}.node not found" >&2
              find "${tmp}" -name "*.node"
              exit 1
            fi
            if [ ! -f "${tmp}/native/snowluma-linux-${native_arch}.so" ]; then
              echo "ERROR: native/snowluma-linux-${native_arch}.so not found" >&2
              find "${tmp}" -name "*.so"
              exit 1
            fi
            if [ ! -f "${tmp}/native/websocket-linux-${native_arch}.node" ]; then
              echo "ERROR: native/websocket-linux-${native_arch}.node not found" >&2
              find "${tmp}" -name "*.node"
              exit 1
            fi
            rm -rf "${tmp}"
            echo "Verified ${file}"
          }
          IFS=',' read -r -a list <<< "${PLATFORMS}"
          for p in "${list[@]}"; do
            p="$(echo "${p}" | xargs)"
            [ -n "${p}" ] && verify_platform "${p}"
          done
          test -f SnowLuma.Framework.tar.gz || { echo "Missing SnowLuma.Framework.tar.gz"; exit 1; }
          echo "All tarballs verified."

      - name: Commit and push updated framework
        if: steps.check.outputs.skip == 'false'
        env:
          SOURCE_REPO: ${{ steps.config.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.config.outputs.source_branch }}
          HEAD_SHA: ${{ steps.check.outputs.head_sha }}
          LOCK_FILE: ${{ steps.check.outputs.lock_file }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "{\"sha\": \"${HEAD_SHA}\"}" > "${LOCK_FILE}"
          git add "${LOCK_FILE}"
          shopt -s nullglob
          for file in SnowLuma.Framework*.tar.gz; do
            git add "${file}"
          done
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: sync ${SOURCE_REPO}@${SOURCE_BRANCH} @ ${HEAD_SHA:0:12}"
          git push
