name: sync-snowluma-dev

on:
  workflow_dispatch:
    inputs:
      force:
        description: Re-download and rebuild even when lock file already matches
        required: false
        type: boolean
        default: false
      platforms:
        description: Comma-separated Dev Build platforms (linux-x64, linux-arm64)
        required: false
        default: "linux-x64,linux-arm64"
      source_repo:
        description: Source repository (owner/repo)
        required: false
        default: "Stlara-F/SnowLuma"
      source_branch:
        description: Source branch
        required: false
        default: "dev"
      target_tag:
        description: Tag used in artifact names (defaults to source_branch)
        required: false
        default: ""
      dockerhub_image:
        description: DockerHub image name (e.g., yourusername/snowluma)
        required: false
        default: ""
      custom_tag:
        description: Custom Docker image tag (required for Docker push)
        required: false
        default: ""
  repository_dispatch:
    types: [snowluma-dev-updated]

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-22.04
    outputs:
      has_update: ${{ steps.compare.outputs.has_update }}
      head_sha: ${{ steps.compare.outputs.head_sha }}
      run_id: ${{ steps.compare.outputs.run_id }}
      source_repo: ${{ steps.config.outputs.source_repo }}
      source_branch: ${{ steps.config.outputs.source_branch }}
      target_tag: ${{ steps.config.outputs.target_tag }}
      lock_file: ${{ steps.compare.outputs.lock_file }}
      dockerhub_image: ${{ steps.config.outputs.dockerhub_image }}
      custom_tag: ${{ steps.config.outputs.custom_tag }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v6

      - name: Resolve configuration
        id: config
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REPO="${{ inputs.source_repo }}"
            BRANCH="${{ inputs.source_branch }}"
            TAG="${{ inputs.target_tag }}"
          elif [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            REPO="${{ github.event.client_payload.source_repo }}"
            BRANCH="${{ github.event.client_payload.source_branch }}"
            TAG="${{ github.event.client_payload.target_tag }}"
          else
            echo "Unsupported event" >&2
            exit 1
          fi
          REPO="${REPO:-Stlara-F/SnowLuma}"
          BRANCH="${BRANCH:-dev}"
          TAG="${TAG:-$BRANCH}"
          DOCKER_IMAGE="${{ inputs.dockerhub_image || '' }}"
          CUSTOM_TAG="${{ inputs.custom_tag || '' }}"
          echo "source_repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "source_branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "target_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${DOCKER_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "custom_tag=${CUSTOM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Compare upstream with last sync state
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.SNOWLUMA_GH_TOKEN || secrets.SNOWLUMA_GITHUB_TOKEN }}
          SOURCE_REPO: ${{ steps.config.outputs.source_repo }}
          SOURCE_BRANCH: ${{ steps.config.outputs.source_branch }}
        run: |
          set -euo pipefail
          LOCK_SUFFIX="$(echo "${SOURCE_REPO}_${SOURCE_BRANCH}" | sha256sum | head -c 8)"
          LOCK_FILE=".github/snowluma-sync-${LOCK_SUFFIX}.json"

          branch_tip="$(gh api repos/${SOURCE_REPO}/commits/${SOURCE_BRANCH} --jq .sha)"
          echo "Upstream ${SOURCE_REPO}@${SOURCE_BRANCH} HEAD: ${branch_tip}"

          force="${{ github.event_name == 'workflow_dispatch' && inputs.force == true && '1' || '0' }}"
          if [ "${force}" = "1" ]; then
            echo "Force sync enabled"
            echo "has_update=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${branch_tip}" >> "$GITHUB_OUTPUT"
            echo "lock_file=${LOCK_FILE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_sha=""
          if [ -f "${LOCK_FILE}" ]; then
            last_sha="$(jq -r '.sha // empty' "${LOCK_FILE}")"
          fi

          if [ "${last_sha}" = "${branch_tip}" ]; then
            echo "Already synced at ${branch_tip}; no update needed."
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "lock_file=${LOCK_FILE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_json="$(gh run list \
            --repo "${SOURCE_REPO}" \
            --workflow "Dev Build" \
            --branch "${SOURCE_BRANCH}" \
            --commit "${branch_tip}" \
            --status success \
            --limit 1 \
            --json databaseId 2>/dev/null || true)"

          if [ -z "${run_json}" ] || [ "${run_json}" = "[]" ]; then
            echo "No successful Dev Build yet for ${branch_tip}; will retry next schedule."
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "lock_file=${LOCK_FILE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id="$(echo "${run_json}" | jq -r '.[0].databaseId')"
          echo "Found Dev Build run: ${run_id}"
          echo "has_update=true" >> "$GITHUB_OUTPUT"
          echo "head_sha=${branch_tip}" >> "$GITHUB_OUTPUT"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "lock_file=${LOCK_FILE}" >> "$GITHUB_OUTPUT"

  sync:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: ubuntu-22.04
    outputs:
      new_sha: ${{ steps.commit-sha.outputs.new_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.SNOWLUMA_GH_TOKEN || secrets.SNOWLUMA_GITHUB_TOKEN }}

      - name: Sync SnowLuma framework tarballs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.SNOWLUMA_GH_TOKEN || secrets.SNOWLUMA_GITHUB_TOKEN }}
          SOURCE_REPO: ${{ needs.check.outputs.source_repo }}
          TARGET_TAG: ${{ needs.check.outputs.target_tag }}
          HEAD_SHA: ${{ needs.check.outputs.head_sha }}
          RUN_ID: ${{ needs.check.outputs.run_id }}
          PLATFORMS: ${{ inputs.platforms || 'linux-x64,linux-arm64' }}
          LOCK_FILE: ${{ needs.check.outputs.lock_file }}
        run: |
          chmod +x ./scripts/sync-dev-framework.sh
          ./scripts/sync-dev-framework.sh

      - name: Verify framework tarballs
        env:
          PLATFORMS: ${{ inputs.platforms || 'linux-x64,linux-arm64' }}
        run: |
          set -euo pipefail
          verify_platform() {
            local platform="$1"
            local native_arch
            case "${platform}" in
              linux-x64) native_arch="x64" ;;
              linux-arm64) native_arch="arm64" ;;
              *) return 1 ;;
            esac
            local file="SnowLuma.Framework.${platform}.tar.gz"
            test -f "${file}" || { echo "Missing ${file}"; exit 1; }
            tmp="$(mktemp -d)"
            tar -xzf "${file}" -C "${tmp}"
            test -f "${tmp}/index.mjs"
            test -f "${tmp}/native/snowluma-linux-${native_arch}.node"
            test -f "${tmp}/native/snowluma-linux-${native_arch}.so"
            test -f "${tmp}/native/websocket-linux-${native_arch}.node"
            rm -rf "${tmp}"
            echo "Verified ${file}"
          }
          IFS=',' read -r -a list <<< "${PLATFORMS}"
          for p in "${list[@]}"; do
            p="$(echo "${p}" | xargs)"
            [ -n "${p}" ] && verify_platform "${p}"
          done
          test -f SnowLuma.Framework.tar.gz || { echo "Missing SnowLuma.Framework.tar.gz"; exit 1; }
          echo "All tarballs verified."

      - name: Commit and push updated framework
        env:
          SOURCE_REPO: ${{ needs.check.outputs.source_repo }}
          SOURCE_BRANCH: ${{ needs.check.outputs.source_branch }}
          HEAD_SHA: ${{ needs.check.outputs.head_sha }}
          LOCK_FILE: ${{ needs.check.outputs.lock_file }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "{\"sha\": \"${HEAD_SHA}\"}" > "${LOCK_FILE}"
          git add "${LOCK_FILE}"
          shopt -s nullglob
          for file in SnowLuma.Framework*.tar.gz; do
            git add "${file}"
          done
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: sync ${SOURCE_REPO}@${SOURCE_BRANCH} @ ${HEAD_SHA:0:12}"
          git push

      - name: Record new commit SHA
        id: commit-sha
        run: echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    needs: [check, sync]
    if: needs.check.outputs.has_update == 'true' && needs.check.outputs.dockerhub_image != '' && needs.check.outputs.custom_tag != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            os: ubuntu-22.04
          - arch: arm64
            platform: linux/arm64
            os: ubuntu-22.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.sync.outputs.new_sha }}

      - name: Prepare platform tarball
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          chmod +x ./scripts/resolve-framework-tarball.sh
          ./scripts/resolve-framework-tarball.sh

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        env:
          IMAGE: ${{ needs.check.outputs.dockerhub_image }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${PLATFORM}" \
            --tag "${IMAGE}" \
            --file ./Dockerfile \
            --output "type=image,push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file metadata.json \
            .
          digest="$(jq -r '."containerimage.digest"' metadata.json)"
          if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
            echo "Unable to resolve pushed image digest" >&2
            cat metadata.json >&2
            exit 1
          fi
          mkdir -p digests
          touch "digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.arch }}
          path: digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: needs.check.outputs.has_update == 'true' && needs.check.outputs.dockerhub_image != '' && needs.check.outputs.custom_tag != ''
    needs: [check, sync, publish]
    runs-on: ubuntu-22.04
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/download-artifact@v7
        with:
          pattern: docker-digest-*
          path: digests
          merge-multiple: true

      - name: Create manifest with custom tag
        env:
          IMAGE: ${{ needs.check.outputs.dockerhub_image }}
          TAG: ${{ needs.check.outputs.custom_tag }}
        run: |
          set -euo pipefail
          cd digests
          shopt -s nullglob
          digest_files=(*)
          if [ "${#digest_files[@]}" -eq 0 ]; then
            echo "No Docker image digests produced" >&2
            exit 1
          fi
          refs=()
          for f in "${digest_files[@]}"; do
            refs+=("${IMAGE}@sha256:${f}")
          done
          docker buildx imagetools create --tag "${IMAGE}:${TAG}" "${refs[@]}"
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
